name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false   # 한 버전 실패해도 다른 버전은 계속 실행

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'                    # pip 캐시로 빌드 속도 향상

      - name: Upgrade pip & install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build setuptools wheel

      - name: Install project dependencies (optional)
        run: |
          # requirements.txt가 있다면 설치 (없으면 스킵)
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # 개발 의존성이나 테스트 의존성이 pyproject.toml에 있다면
          # pip install -e ".[dev]" 또는 pip install -e ".[test]" 로 변경 가능

      - name: Build pyalembic package (sdist + wheel)
        run: |
          python -m build --no-isolation
          echo "✅ Build completed for Python ${{ matrix.python-version }}"

      - name: List built artifacts
        run: |
          ls -lh dist/
          echo "📦 Built files:"
          ls dist/