name: Linux pyalembic Build (Native Blender Path)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # ==========================================
      # [STEP 1] 3.13 버전일 때만 블렌더 5.1 네이티브 환경 준비
      # ==========================================
      - name: Install Blender 5.1 (for Python 3.13 Build)
        if: matrix.python-version == '3.13'
        run: |
          URL="blender.org"
          curl -L "$URL" -o blender.tar.xz
          mkdir -p ~/blender_env
          tar -xJf blender.tar.xz -C ~/blender_env --strip-components=1
          
          # 블렌더 내장 파이썬 바이너리 및 인클루드/라이브러리 경로 강제 자동 추출
          B_PYTHON=$(find ~/blender_env -name python3.13 -type f -executable | head -n 1)
          B_INCLUDE=$(find ~/blender_env -name python3.13 -type d | grep include | head -n 1)
          
          # 다음 스텝에서 참조 가능하도록 깃허브 글로벌 환경변수에 박아둠
          echo "B_PY_EXE=$B_PYTHON" >> $GITHUB_ENV
          echo "B_PY_INC=$B_INCLUDE" >> $GITHUB_ENV

      # ==========================================
      # [STEP 2] 3.11 버전일 때만 일반 시스템 파이썬 준비
      # ==========================================
      - name: Set up System Python 3.11
        if: matrix.python-version == '3.11'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev patchelf

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src

      - name: Patch Alembic CMake (Remove PyImath Dependency)
        run: |
          sed -i '/INCLUDE.*AmenbicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt 2>/dev/null || true
          sed -i '/INCLUDE.*AlembicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt 2>/dev/null || true
          sed -i '/${ALEMBIC_PYIMATH_LIB}/d' alembic_src/python/PyAlembic/CMakeLists.txt 2>/dev/null || true

      # ==========================================
      # [STEP 3] 3.13 전용 블렌더 네이티브 컴파일 및 정제
      # ==========================================
      - name: Build and Package with Blender Python (3.13)
        if: matrix.python-version == '3.13'
        run: |
          # 블렌더 파이썬에 직접 pip 라이브러리 탑재
          $B_PY_EXE -m ensurepip 2>/dev/null || true
          $B_PY_EXE -m pip install --upgrade pip setuptools wheel scikit-build 2>/dev/null || true

          mkdir -p build && cd build
          # 블렌더 파이썬 인클루드를 대고 컴파일하므로 libpython 목적지 파일 복사가 불필요함
          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$B_PY_EXE \
            -DPYTHON_INCLUDE_DIR=$B_PY_INC \
            -DUSE_PYALEMBIC=ON -DUSE_PYIMATH=OFF -DUSE_TESTS=OFF -DALEMBIC_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release -DPYIMATH_LIBRARIES="" -DPYIMATH_INCLUDE_DIR=""
          make -j$(nproc)
          make install
          cd ..

          # 최종 아티팩트 정제 폴더 생성 및 복사
          mkdir -p final_package/lib
          cp build/python/PyAlembic/alembic*.so final_package/alembic.so
          find build -name "libAlembic.so*" -exec cp -v {} final_package/lib/ \;
          find build -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          find /usr/lib/x86_64-linux-gnu/ -name "libboost_python*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 물리적 RPATH 강제 주입
          patchelf --set-rpath '$ORIGIN:$ORIGIN/lib' final_package/alembic.so
          echo "=== 3.13 Package Structure ==="
          ls -R final_package/

      # ==========================================
      # [STEP 4] 3.11 전용 시스템 기본 파이썬 컴파일 및 정제
      # ==========================================
      - name: Build and Package for System Python (3.11)
        if: matrix.python-version == '3.11'
        run: |
          mkdir -p build && cd build
          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$(which python) \
            -DUSE_PYALEMBIC=ON -DUSE_PYIMATH=OFF -DUSE_TESTS=OFF -DALEMBIC_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release -DPYIMATH_LIBRARIES="" -DPYIMATH_INCLUDE_DIR=""
          make -j$(nproc)
          make install
          cd ..
          
          mkdir -p final_package/lib
          cp build/python/PyAlembic/alembic*.so final_package/alembic.so
          find build -name "libAlembic.so*" -exec cp -v {} final_package/lib/ \;
          find build -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          find /opt/hostedtoolcache/Python/ -name "libpython3.11*.so*" -exec cp -v {} final_package/lib/ \;
          find /usr/lib/x86_64-linux-gnu/ -name "libboost_python*.so*" -exec cp -v {} final_package/lib/ \;
          
          patchelf --set-rpath '$ORIGIN:$ORIGIN/lib' final_package/alembic.so
          echo "=== 3.11 Package Structure ==="
          ls -R final_package/

      # ==========================================
      # [STEP 5] 추출 완료된 아티팩트 업로드
      # ==========================================
      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GroomForge-Linux-py${{ matrix.python-version }}
          path: final_package/
