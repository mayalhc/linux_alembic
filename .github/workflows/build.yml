name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src

      # PyImath 완전 제거 패치 유지 (Ubuntu에 PyImath 패키지가 없어서 에러 방지)
      - name: Patch Alembic CMake (Remove PyImath Dependency)
        run: |
          sed -i '/INCLUDE.*AlembicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt
          sed -i '/${ALEMBIC_PYIMATH_LIB}/d' alembic_src/python/PyAlembic/CMakeLists.txt
          echo "=== Patched PyAlembic/CMakeLists.txt ==="
          sed -n '120,160p' alembic_src/python/PyAlembic/CMakeLists.txt

      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p build && cd build
          PY_EXE=$(which python)
          
          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$PY_EXE \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=OFF \
            -DUSE_TESTS=OFF \
            -DALEMBIC_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DPYIMATH_LIBRARIES="" \
            -DPYIMATH_INCLUDE_DIR=""
          
          make -j$(nproc)
          make install


      - name: Prepare Final Package
        run: |
          mkdir -p final_package/lib
          
          # 1. 파이썬 바인딩 모듈 복사
          cp build/python/PyAlembic/alembic*.so final_package/alembic.so
          
          # 2. 엔진 라이브러리(Alembic, Imath) 복사
          find build -name "libAlembic.so*" -exec cp -v {} final_package/lib/ \;
          find build -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 3. [추가] libpython 파일 긁어오기
          # 빌드 서버가 사용하는 해당 파이썬 버전의 .so 파일을 찾아서 복사합니다.
          find /opt/hostedtoolcache/Python/ -name "libpython${{ matrix.python-version }}*.so*" -exec cp -v {} final_package/lib/ \;
          find /usr/lib/x86_64-linux-gnu/ -name "libpython${{ matrix.python-version }}*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 4. 부스트 라이브러리 복사
          find /usr/lib/x86_64-linux-gnu/ -name "libboost_python*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 5. RPATH 설정
          sudo apt-get update && sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN:$ORIGIN/lib' final_package/alembic.so
          
          echo "=== 모든 부품이 포함된 패키지 목록 ==="
          ls -R final_package/
          
      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GroomForge-Linux-py${{ matrix.python-version }}
          path: final_package/
