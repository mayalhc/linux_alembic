name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # 1. 시스템 의존성 설치 (리눅스 빌드 필수)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # alembic-dev 대신 필수 빌드 도구와 Imath, Boost만 설치
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev python3-dev

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src  # 앨램빅 소스를 별도 폴더에 다운로드

      - name: Build Alembic & PyAlembic
        run: |
          mkdir build && cd build
          # 직접 다운로드한 소스 경로(../alembic_src)를 지정하여 빌드
          cmake ../alembic_src \
            -DPYTHON_EXECUTABLE=$(which python) \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=ON \
            -DALEMBIC_SHARED_LIBS=ON \
            -DILMBASE_ROOT=/usr \
            -DPYTHON_INCLUDE_DIR=$(python -c "from distutils.sysconfig import get_python_inc; print(get_python_inc())") \
            -DPYTHON_LIBRARY=$(python -c "import os, sysconfig; print(os.path.join(sysconfig.get_config_var('LIBDIR'), sysconfig.get_config_var('INSTSONAME')))")
          make -j$(nproc)

      # 3. 결과물 확인 및 업로드
      - name: List and Upload Artifacts
        run: |
          ls -lh build/*.so
          echo "✅ .so files generated!"
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-alembic-py${{ matrix.python-version }}
          path: build/*.so
