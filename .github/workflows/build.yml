name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # 1. Python 버전 설정 (matrix에 따라 정확한 Python 사용)
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 2. 시스템 의존성 설치 (Imath + Boost만 설치, PyImath는 의도적으로 제외)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src

      # 3. PyImath 의존성 완전 제거 패치 (기존 sed가 동작하지 않았던 이유 수정)
      - name: Patch Alembic CMake (Remove PyImath Dependency)
        run: |
          # AlembicPyIlmBase.cmake include 제거 (PyImath_FIND가 실행되지 않도록)
          sed -i '/INCLUDE.*AlembicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt
          
          # TARGET_LINK_LIBRARIES에서 ${ALEMBIC_PYIMATH_LIB} 라인 완전 제거
          # (이전 sed는 변수명/경로가 맞지 않아 아무것도 제거되지 않았음)
          sed -i '/${ALEMBIC_PYIMATH_LIB}/d' alembic_src/python/PyAlembic/CMakeLists.txt
          
          echo "=== Patched PyAlembic/CMakeLists.txt ==="
          sed -n '120,160p' alembic_src/python/PyAlembic/CMakeLists.txt

      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p build && cd build
          PY_EXE=$(which python)
          
          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$PY_EXE \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=OFF \
            -DUSE_TESTS=OFF \
            -DALEMBIC_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)

      # 4. 결과물 확인 (PyAlembic .so는 build/python/PyAlembic/ 아래에 생성됨)
      - name: List and Upload Artifacts
        run: |
          echo "=== Generated Python bindings ==="
          ls -lh build/python/PyAlembic/*.so || echo "No .so found (check path)"
          find build -name "*.so" -type f | head -10

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-alembic-py${{ matrix.python-version }}
          path: build/python/PyAlembic/*.so
