name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # 1. 시스템 의존성 설치 (리눅스 빌드 필수)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # alembic-dev 대신 필수 빌드 도구와 Imath, Boost만 설치
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev python3-dev

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src  # 앨램빅 소스를 별도 폴더에 다운로드

      - name: Build Alembic & PyAlembic
        run: |
          mkdir build && cd build
          # 현재 매트릭스의 파이썬 경로를 정확히 변수에 담습니다.
          PY_EXE=$(which python)
          PY_INC=$(python -c "import sysconfig; print(sysconfig.get_path('include'))")
          PY_VER=$(python -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")

          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$PY_EXE \
            -DPYTHON_INCLUDE_DIR=$PY_INC \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=OFF \
            -DUSE_TESTS=OFF \
            -DALEMBIC_SHARED_LIBS=ON \
            -DPYALEMBIC_PYTHON_VERSION=$PY_VER \
            -DBoost_PYTHON_LIBRARY_RELEASE=/usr/lib/x86_64-linux-gnu/libboost_python${PY_VER/./}.so
          
          make -j$(nproc)
      # 3. 결과물 확인 및 업로드
      - name: List and Upload Artifacts
        run: |
          ls -lh build/*.so
          echo "✅ .so files generated!"
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-alembic-py${{ matrix.python-version }}
          path: build/*.so
