name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # 1. 시스템 의존성 설치 (리눅스 빌드 필수)
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libimath-dev libalembic-dev python3-dev

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # cache: 'pip' 를 삭제하여 에러 방지

      # 2. PyAlembic 소스 가져오기 및 빌드
      # (기존에 맥에서 빌드할 때 쓰신 소스 폴더가 있다면 그 경로를 지정하세요)
      - name: Build PyAlembic (.so)
        run: |
          mkdir build && cd build
          cmake .. \
            -DPYTHON_EXECUTABLE=$(which python) \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=ON
          make -j$(nproc)

      # 3. 결과물 확인 및 업로드
      - name: List and Upload Artifacts
        run: |
          ls -lh build/*.so
          echo "✅ .so files generated!"
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-alembic-py${{ matrix.python-version }}
          path: build/*.so
