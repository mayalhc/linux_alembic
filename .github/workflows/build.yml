name: Linux pyalembic Build (Native Blender Path)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      # 1. [3.13 전용] 블렌더 5.1 설치 및 내장 파이썬 경로 추출
      - name: Install Blender 5.1 (for Python 3.13 Build)
        if: matrix.python-version == '3.13'
        run: |
          URL="https://download.blender.org/release/Blender5.1/blender-5.1.1-linux-x64.tar.xz"
          curl -L "$URL" -o blender.tar.xz
          mkdir -p ~/blender_env
          tar -xJf blender.tar.xz -C ~/blender_env --strip-components=1
          # 블렌더 내부 파이썬 및 라이브러리 경로 환경변수 등록
          echo "B_PY_EXE=$(find ~/blender_env -name python3.13 -type f -executable | head -n 1)" >> $GITHUB_ENV
          echo "B_PY_LIB=$(dirname $(find ~/blender_env -name libpython3.13.so.1.0 | head -n 1))" >> $GITHUB_ENV
          echo "B_PY_INC=$(find ~/blender_env -name python3.13 -type d | grep include | head -n 1)" >> $GITHUB_ENV

      # 2. [3.11 전용] 시스템 파이썬 설정
      - name: Set up System Python 3.11
        if: matrix.python-version == '3.11'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev patchelf

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src

      - name: Patch Alembic CMake
        run: |
          sed -i '/INCLUDE.*AlembicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt
          sed -i '/${ALEMBIC_PYIMATH_LIB}/d' alembic_src/python/PyAlembic/CMakeLists.txt

            # 3. 전략적 빌드 (변수 참조 방식 수정)
      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p build && cd build
          
          if [ "${{ matrix.python-version }}" == "3.13" ]; then
            # 블렌더 내장 파이썬 환경 타겟팅 (쉘 변수 $B_PY_... 사용)
            cmake ../alembic_src \
              -DCMAKE_INSTALL_PREFIX=./install \
              -DPYTHON_EXECUTABLE=$B_PY_EXE \
              -DPYTHON_INCLUDE_DIR=$B_PY_INC \
              -DPYTHON_LIBRARY=$B_PY_LIB/libpython3.13.so.1.0 \
              -DUSE_PYALEMBIC=ON -DUSE_PYIMATH=OFF -DUSE_TESTS=OFF -DALEMBIC_SHARED_LIBS=ON \
              -DCMAKE_BUILD_TYPE=Release -DPYIMATH_LIBRARIES="" -DPYIMATH_INCLUDE_DIR=""
          else
            # 기존 3.11 시스템 빌드 방식
            cmake ../alembic_src \
              -DCMAKE_INSTALL_PREFIX=./install \
              -DPYTHON_EXECUTABLE=$(which python) \
              -DUSE_PYALEMBIC=ON -DUSE_PYIMATH=OFF -DUSE_TESTS=OFF -DALEMBIC_SHARED_LIBS=ON \
              -DCMAKE_BUILD_TYPE=Release -DPYIMATH_LIBRARIES="" -DPYIMATH_INCLUDE_DIR=""
          fi
          
          make -j$(nproc)
          make install

      - name: Prepare Final Package
        run: |
          mkdir -p final_package/lib
          cp build/python/PyAlembic/alembic*.so final_package/alembic.so
          find build -name "libAlembic.so*" -exec cp -v {} final_package/lib/ \;
          find build -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 파이썬 엔진(.so) 복사 부분 수정
          if [ "${{ matrix.python-version }}" == "3.13" ]; then
            cp -v $B_PY_LIB/libpython3.13.so* final_package/lib/
          else
            find /opt/hostedtoolcache/Python/ -name "libpython3.11*.so*" -exec cp -v {} final_package/lib/ \;
          fi
          
          find /usr/lib/x86_64-linux-gnu/ -name "libboost_python*.so*" -exec cp -v {} final_package/lib/ \;
          patchelf --set-rpath '$ORIGIN:$ORIGIN/lib' final_package/alembic.so

          ls -R final_package/

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GroomForge-Linux-py${{ matrix.python-version }}
          path: final_package/
