name: Build_Linux_Alembic_CP313

on:
  workflow_dispatch:

jobs:
  build-linux-cp313:
    runs-on: ubuntu-24.04

    steps:
      # ============================================================
      # Checkout
      # ============================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Python 3.13 (FULL DEV HEADERS)
      # ============================================================
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ============================================================
      # Install Build Dependencies
      # ============================================================
      - name: Install Dependencies
        shell: bash
        run: |
          set -eux

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            unzip \
            tar \
            xz-utils \
            pkg-config \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libffi-dev \
            libssl-dev \
            libopenexr-dev \
            libimath-dev

      # ============================================================
      # Verify Python
      # ============================================================
      - name: Verify Python
        shell: bash
        run: |
          set -eux

          which python

          python --version

          python -c "
import sys
import sysconfig

print('Executable:', sys.executable)
print('Include:', sysconfig.get_paths()['include'])
"

          find $(python -c "import sysconfig; print(sysconfig.get_paths()['include'])") \
            -name pyconfig.h

      # ============================================================
      # Build Boost Python 3.13
      # ============================================================
      - name: Build Boost Python 3.13
        shell: bash
        run: |
          set -eux

          BOOST_VERSION=1.86.0
          BOOST_FOLDER=boost_1_86_0

          curl -L \
            https://archives.boost.io/release/1.86.0/source/${BOOST_FOLDER}.tar.gz \
            -o boost.tar.gz

          tar -xf boost.tar.gz

          cd ${BOOST_FOLDER}

          PYTHON_BIN=$(which python)

          ./bootstrap.sh \
            --with-python="$PYTHON_BIN"

          ./b2 \
            -j$(nproc) \
            link=shared \
            runtime-link=shared \
            threading=multi \
            variant=release \
            python=3.13 \
            --with-python \
            install \
            --prefix=$HOME/boost-install

          echo "BOOST_ROOT=$HOME/boost-install" >> $GITHUB_ENV

          ls -la $HOME/boost-install/lib

      # ============================================================
      # Verify Boost Python 313
      # ============================================================
      - name: Verify Boost Python
        shell: bash
        run: |
          set -eux

          ls -la $HOME/boost-install/lib

          find $HOME/boost-install/lib | grep boost_python || true

      # ============================================================
      # Clone Alembic
      # ============================================================
      - name: Clone Alembic
        shell: bash
        run: |
          set -eux

          git clone \
            --recursive \
            https://github.com/alembic/alembic.git

      # ============================================================
      # Configure Alembic
      # ============================================================
      - name: Configure Alembic
        shell: bash
        run: |
          set -eux

          mkdir -p alembic/build

          cd alembic/build

          PYTHON_BIN=$(which python)

          BOOST_LIB=$(find $HOME/boost-install/lib | grep "boost_python313" | head -n 1)

          echo "BOOST_LIB=$BOOST_LIB"

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_PYALEMBIC=ON \
            -DALEMBIC_SHARED_LIBS=ON \
            -DPYTHON_EXECUTABLE="$PYTHON_BIN" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DBOOST_ROOT="$HOME/boost-install" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=OFF \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=OFF \
            -DBoost_INCLUDE_DIR="$HOME/boost-install/include" \
            -DBoost_LIBRARY_DIR="$HOME/boost-install/lib" \
            -DBoost_PYTHON_LIBRARY="$BOOST_LIB"

      # ============================================================
      # Build Alembic
      # ============================================================
      - name: Build Alembic
        shell: bash
        run: |
          set -eux

          cd alembic/build

          ninja -j$(nproc)

      # ============================================================
      # Verify CP313 ABI
      # ============================================================
      - name: Verify Alembic ABI
        shell: bash
        run: |
          set -eux

          ALEMBIC_SO=$(find alembic/build | grep "cpython-313.*\.so" | head -n 1)

          echo "ALEMBIC_SO=$ALEMBIC_SO"

          ldd "$ALEMBIC_SO" || true

          echo "======================================"
          echo "BOOST CHECK"
          echo "======================================"

          ldd "$ALEMBIC_SO" | grep boost || true

          echo "======================================"
          echo "PYTHON CHECK"
          echo "======================================"

          ldd "$ALEMBIC_SO" | grep python || true

      # ============================================================
      # Package linux_313
      # ============================================================
      - name: Package linux_313
        shell: bash
        run: |
          set -eux

          mkdir -p linux_313

          ALEMBIC_SO=$(find alembic/build | grep "cpython-313.*\.so" | head -n 1)

          cp "$ALEMBIC_SO" linux_313/

          cp alembic/build/lib/libAlembic.so* linux_313/ || true

          cp /usr/lib/x86_64-linux-gnu/libImath*.so* linux_313/ || true

          cp $HOME/boost-install/lib/libboost_python313.so* linux_313/ || true

          ls -la linux_313

      # ============================================================
      # Upload Artifact
      # ============================================================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_313
          path: linux_313
