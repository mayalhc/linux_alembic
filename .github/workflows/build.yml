name: Build_Linux_Alembic_CP313

on:
  workflow_dispatch:

jobs:
  build-linux-cp313:
    runs-on: ubuntu-24.04

    steps:
      # ============================================================
      # Checkout
      # ============================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # Install Build Packages
      # ============================================================
      - name: Install Dependencies
        shell: bash
        run: |
          set -eux

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            curl \
            wget \
            unzip \
            tar \
            xz-utils \
            pkg-config \
            libz-dev \
            zlib1g-dev \
            libbz2-dev \
            liblzma-dev \
            libffi-dev \
            libssl-dev \
            libopenexr-dev \
            libimath-dev

      # ============================================================
      # Install Blender 5.1
      # ============================================================
      - name: Install Blender 5.1
        shell: bash
        run: |
          set -eux

          BLENDER_URL="https://download.blender.org/release/Blender5.1/blender-5.1.1-linux-x64.tar.xz"

          mkdir -p $HOME/blender

          curl -L "$BLENDER_URL" -o blender.tar.xz

          tar -xf blender.tar.xz \
            -C $HOME/blender \
            --strip-components=1

          echo "BLENDER_DIR=$HOME/blender" >> $GITHUB_ENV
          echo "BLENDER_BIN=$HOME/blender/blender" >> $GITHUB_ENV

      # ============================================================
      # Detect Blender Python 3.13
      # ============================================================
      - name: Detect Blender Python
        shell: bash
        run: |
          set -eux

          PYTHON_BIN=$(
            find $HOME/blender -type f | grep "python/bin/python3.13" | head -n 1
          )

          echo "PYTHON_BIN=$PYTHON_BIN" >> $GITHUB_ENV

          "$PYTHON_BIN" --version

      # ============================================================
      # Build Boost Python 3.13
      # ============================================================
      - name: Build Boost Python 3.13
        shell: bash
        run: |
          set -eux

          BOOST_VERSION=1.86.0
          BOOST_DIR=$HOME/boost_1_86_0

          curl -L \
            https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz \
            -o boost.tar.gz

          tar -xf boost.tar.gz -C $HOME

          cd $BOOST_DIR

          PYTHON_ROOT=$(dirname $(dirname "$PYTHON_BIN"))

          ./bootstrap.sh \
            --with-python="$PYTHON_BIN"

          ./b2 \
            -j$(nproc) \
            link=shared \
            runtime-link=shared \
            threading=multi \
            variant=release \
            python=3.13 \
            --with-python \
            install \
            --prefix=$HOME/boost-install

          echo "BOOST_ROOT=$HOME/boost-install" >> $GITHUB_ENV

          ls -la $HOME/boost-install/lib || true

      # ============================================================
      # Clone Alembic
      # ============================================================
      - name: Clone Alembic
        shell: bash
        run: |
          set -eux

          git clone \
            --recursive \
            https://github.com/alembic/alembic.git

      # ============================================================
      # Configure Alembic
      # ============================================================
      - name: Configure Alembic CP313
        shell: bash
        run: |
          set -eux

          mkdir -p alembic/build

          cd alembic/build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_PYALEMBIC=ON \
            -DALEMBIC_SHARED_LIBS=ON \
            -DPYTHON_EXECUTABLE="$PYTHON_BIN" \
            -DPython3_EXECUTABLE="$PYTHON_BIN" \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=OFF \
            -DBoost_USE_MULTITHREADED=ON \
            -DBoost_USE_STATIC_RUNTIME=OFF \
            -DBoost_INCLUDE_DIR="$BOOST_ROOT/include" \
            -DBoost_LIBRARY_DIR="$BOOST_ROOT/lib" \
            -DBoost_PYTHON_LIBRARY="$BOOST_ROOT/lib/libboost_python313.so"

      # ============================================================
      # Build Alembic
      # ============================================================
      - name: Build Alembic
        shell: bash
        run: |
          set -eux

          cd alembic/build

          ninja -j$(nproc)

      # ============================================================
      # Verify Build
      # ============================================================
      - name: Verify CP313 Build
        shell: bash
        run: |
          set -eux

          cd alembic/build

          find . -name "*.so"

          ALEMBIC_SO=$(find . | grep "cpython-313.*\.so" | head -n 1)

          echo "ALEMBIC_SO=$ALEMBIC_SO"

          ldd "$ALEMBIC_SO" || true

          echo "======================================"
          echo "BOOST CHECK"
          echo "======================================"

          ldd "$ALEMBIC_SO" | grep boost || true

          echo "======================================"
          echo "PYTHON CHECK"
          echo "======================================"

          ldd "$ALEMBIC_SO" | grep python || true

      # ============================================================
      # Package
      # ============================================================
      - name: Package linux_313
        shell: bash
        run: |
          set -eux

          mkdir -p linux_313

          ALEMBIC_SO=$(find alembic/build | grep "cpython-313.*\.so" | head -n 1)

          cp "$ALEMBIC_SO" linux_313/

          cp alembic/build/lib/libAlembic.so* linux_313/ || true

          cp /usr/lib/x86_64-linux-gnu/libImath*.so* linux_313/ || true

          cp $HOME/boost-install/lib/libboost_python313.so* linux_313/ || true

          ls -la linux_313

      # ============================================================
      # Upload
      # ============================================================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux_313
          path: linux_313
