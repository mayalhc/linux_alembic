name: Linux pyalembic Build (Python 3.11 & 3.13)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout GroomForge Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-python-dev libboost-thread-dev libimath-dev

      - name: Checkout Alembic Source
        uses: actions/checkout@v4
        with:
          repository: alembic/alembic
          path: alembic_src

      # PyImath 완전 제거 패치 유지 (Ubuntu에 PyImath 패키지가 없어서 에러 방지)
      - name: Patch Alembic CMake (Remove PyImath Dependency)
        run: |
          sed -i '/INCLUDE.*AlembicPyIlmBase.cmake/d' alembic_src/python/PyAlembic/CMakeLists.txt
          sed -i '/${ALEMBIC_PYIMATH_LIB}/d' alembic_src/python/PyAlembic/CMakeLists.txt
          echo "=== Patched PyAlembic/CMakeLists.txt ==="
          sed -n '120,160p' alembic_src/python/PyAlembic/CMakeLists.txt

      - name: Build Alembic & PyAlembic
        run: |
          mkdir -p build && cd build
          PY_EXE=$(which python)
          
          cmake ../alembic_src \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DPYTHON_EXECUTABLE=$PY_EXE \
            -DUSE_PYALEMBIC=ON \
            -DUSE_PYIMATH=OFF \
            -DUSE_TESTS=OFF \
            -DALEMBIC_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release
          
          make -j$(nproc)
          make install   # ← 추가! libAlembic.so 등 설치 파일 생성

      - name: Prepare Final Package
        run: |
          mkdir -p final_package/lib
          
          # 1. 파이썬 바인딩 모듈 복사 (이름을 alembic.so로 통일)
          cp build/python/PyAlembic/alembic*.so final_package/alembic.so
          
          # 2. 핵심 엔진 라이브러리(Alembic) 복사
          find build -name "libAlembic.so*" -exec cp -v {} final_package/lib/ \;
          
          # 3. 필수 수학 라이브러리(Imath) 복사
          find build -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          find /usr/lib/x86_64-linux-gnu/ -name "libImath*.so*" -exec cp -v {} final_package/lib/ \;
          
          # 4. 부스트 파이썬 라이브러리 복사 (해당 파이썬 버전용)
          find /usr/lib/x86_64-linux-gnu/ -name "libboost_python${{ matrix.python-version }}*.so*" -exec cp -v {} final_package/lib/ \;

          # 5. RPATH 설정 (alembic.so가 옆의 lib 폴더를 참조하게 고정)
          sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN/lib' final_package/alembic.so
          
          echo "=== Final Package Structure ==="
          ls -R final_package/

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GroomForge-Linux-py${{ matrix.python-version }}
          path: final_package/
